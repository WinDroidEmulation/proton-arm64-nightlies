name: Generate contents.json

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contents.json from release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]

          result = subprocess.run(
              ["gh", "api", f"repos/{repo}/releases/tags/{tag}"],
              capture_output=True,
              text=True,
              check=True
          )

          release = json.loads(result.stdout)
          assets = release.get("assets", [])

          contents = []

          for asset in assets:
              name = asset["name"]
              url = asset["browser_download_url"]

              if name == "contents.json":
                  continue

              if name.lower().startswith("source code"):
                  continue

              if url.endswith("/zipball/" + tag) or url.endswith("/tarball/" + tag):
                  continue

              lower = name.lower()

              if lower.endswith(".wcp.xz"):
                  asset_type = "proton"
                  description = "Compressed build"
              elif lower.endswith(".wcp"):
                  asset_type = "proton"
                  description = "Build package"
              elif lower.endswith(".xz"):
                  asset_type = "proton"
                  description = "Compressed asset"
              elif lower.endswith(".zip"):
                  asset_type = "proton"
                  description = "ZIP asset"
              else:
                  asset_type = "proton"
                  description = "Release asset"

              contents.append({
                  "title": name,
                  "type": asset_type,
                  "fileName": name,
                  "url": url,
                  "description": description
              })

          manifest = {
              "name": "WinDroidEmulation Proton Repo",
              "author": "WinDroidEmulation",
              "version": 1,
              "contents": contents
          }

          with open("contents.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)

          print("Generated contents.json")
          PY

      - name: Delete old contents.json if present
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          ASSET_ID=$(gh api repos/$REPO/releases/tags/$TAG --jq '.assets[] | select(.name=="contents.json") | .id' || true)
          if [ -n "$ASSET_ID" ]; then
            gh api --method DELETE repos/$REPO/releases/assets/$ASSET_ID
          fi

      - name: Upload contents.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" contents.json
