name: Generate contents.json

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contents.json
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]

          result = subprocess.run(
              [
                  "gh", "api",
                  f"repos/{repo}/releases/tags/{tag}"
              ],
              capture_output=True,
              text=True,
              check=True
          )

          release = json.loads(result.stdout)
          assets = release.get("assets", [])

          contents = []
          for asset in assets:
              name = asset["name"]

              # Ignore source code archives and the manifest itself
              if name in ("contents.json",):
                  continue
              if name.startswith("Source code"):
                  continue
              if name.endswith(".zip") and "source" in name.lower():
                  continue
              if name.endswith(".tar.gz") and "source" in name.lower():
                  continue

              download_url = asset["browser_download_url"]

              if name.endswith(".wcp.xz"):
                  title = f"{name} (Compressed)"
                  description = "Compressed Proton ARM64EC build"
              elif name.endswith(".wcp"):
                  title = f"{name} (WCP)"
                  description = "Proton ARM64EC build"
              else:
                  title = name
                  description = "Release asset"

              contents.append({
                  "title": title,
                  "type": "proton",
                  "fileName": name,
                  "url": download_url,
                  "description": description
              })

          manifest = {
              "name": "WinDroidEmulation Proton ARM64 Repo",
              "author": "WinDroidEmulation",
              "version": 1,
              "contents": contents
          }

          with open("contents.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)

          print("Generated contents.json")
          PY

      - name: Delete old contents.json if it exists
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          ASSET_ID=$(gh api repos/$REPO/releases/tags/$TAG --jq '.assets[] | select(.name=="contents.json") | .id' || true)
          if [ -n "$ASSET_ID" ]; then
            gh api \
              --method DELETE \
              repos/$REPO/releases/assets/$ASSET_ID
          fi

      - name: Upload contents.json to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" contents.json --clobber
